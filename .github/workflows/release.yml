name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libgtk-3-dev \
            libgtk4-layer-shell-dev \
            libgraphene-1.0-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            gui/src-tauri

      - name: Build CLI
        run: cargo build --release --locked

      - name: Install GUI dependencies
        run: npm --prefix gui ci

      - name: Build GUI binary
        run: npm --prefix gui run tauri:build -- --no-bundle

      - name: Test
        run: |
          cargo test --locked
          npm --prefix gui run typecheck
          cargo check --release --locked --manifest-path gui/src-tauri/Cargo.toml

      - name: Package release artifact
        run: |
          set -euo pipefail
          mkdir -p dist/jobowalls-x86_64-unknown-linux-gnu/bin
          mkdir -p dist/jobowalls-x86_64-unknown-linux-gnu/share/applications
          install -m 0755 target/release/jobowalls \
            dist/jobowalls-x86_64-unknown-linux-gnu/bin/jobowalls
          install -m 0755 target/release/jobowalls-shell \
            dist/jobowalls-x86_64-unknown-linux-gnu/bin/jobowalls-shell
          install -m 0755 gui/src-tauri/target/release/jobowalls-gui \
            dist/jobowalls-x86_64-unknown-linux-gnu/bin/jobowalls-gui-bin
          install -m 0755 packaging/linux/jobowalls-gui \
            dist/jobowalls-x86_64-unknown-linux-gnu/bin/jobowalls-gui
          install -m 0644 packaging/linux/dev.jobowalls.picker.desktop \
            dist/jobowalls-x86_64-unknown-linux-gnu/share/applications/dev.jobowalls.picker.desktop
          tar -C dist/jobowalls-x86_64-unknown-linux-gnu \
            -czf dist/jobowalls-x86_64-unknown-linux-gnu.tar.gz .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: jobowalls-x86_64-unknown-linux-gnu
          path: dist/jobowalls-x86_64-unknown-linux-gnu.tar.gz

      - name: Upload GitHub release artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/jobowalls-x86_64-unknown-linux-gnu.tar.gz
